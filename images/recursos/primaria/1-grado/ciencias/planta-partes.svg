  <circle cx="240" cy="47" r="10" fill="#F9A825"/>
  <circle cx="236" cy="43" r="2" fill="#FF6F00"/>
  <circle cx="244" cy="43" r="2" fill="#FF6F00"/>
  <circle cx="240" cy="50" r="2" fill="#FF6F00"/>

