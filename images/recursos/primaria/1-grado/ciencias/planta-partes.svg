  <line x1="246" y1="215" x2="370" y2="215" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="370" y="203" width="68" height="26" fill="white" rx="6" stroke="#ddd" stroke-width="1"/>
  <text x="404" y="221" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#14532d" text-anchor="middle">Tallo</text>

