<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <!-- Shadow -->
  <ellipse cx="60" cy="175" rx="32" ry="5" fill="#00000015"/>
  <!-- Legs -->
  <rect x="38" y="130" width="16" height="42" rx="8" fill="#E8A870"/>
  <rect x="66" y="130" width="16" height="42" rx="8" fill="#E8A870"/>
  <!-- Shoes -->
  <ellipse cx="46" cy="172" rx="12" ry="7" fill="#8B4040"/>
  <ellipse cx="74" cy="172" rx="12" ry="7" fill="#8B4040"/>
  <!-- Dress body -->
  <path d="M 30 90 Q 20 130 25 148 L 95 148 Q 100 130 90 90 Z" fill="#E05A8A"/>
  <!-- Dress pattern dots -->
  <circle cx="50" cy="110" r="3" fill="white" opacity="0.5"/>
  <circle cx="70" cy="115" r="3" fill="white" opacity="0.5"/>
  <circle cx="55" cy="128" r="3" fill="white" opacity="0.5"/>
  <circle cx="75" cy="130" r="3" fill="white" opacity="0.5"/>
  <circle cx="42" cy="130" r="2.5" fill="white" opacity="0.5"/>
  <!-- Waist belt -->
  <rect x="30" y="104" width="60" height="8" rx="3" fill="#C04070"/>
  <!-- Torso top (blouse) -->
  <rect x="32" y="72" width="56" height="35" rx="8" fill="#F0E0B0"/>
  <!-- Neck -->
  <rect x="52" y="56" width="16" height="20" rx="6" fill="#F5C89A"/>
  <!-- Head -->
  <circle cx="60" cy="44" r="28" fill="#F5C89A"/>
  <!-- Hair -->
  <path d="M 34 32 Q 36 8 60 10 Q 84 8 86 32" fill="#4A2800"/>
  <path d="M 36 44 Q 28 70 32 80" stroke="#4A2800" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M 84 44 Q 92 70 88 80" stroke="#4A2800" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Hair bun -->
  <circle cx="60" cy="16" r="10" fill="#4A2800"/>
  <!-- Eyes -->
  <circle cx="48" cy="44" r="5" fill="white"/>
  <circle cx="48" cy="44" r="3" fill="#3D2010"/>
  <circle cx="50" cy="42" r="1" fill="white"/>
  <circle cx="72" cy="44" r="5" fill="white"/>
  <circle cx="72" cy="44" r="3" fill="#3D2010"/>
  <circle cx="74" cy="42" r="1" fill="white"/>
  <!-- Eyelashes -->
  <path d="M 44 40 L 43 37" stroke="#3D2010" stroke-width="1.2"/>
  <path d="M 48 39 L 48 36" stroke="#3D2010" stroke-width="1.2"/>
  <path d="M 68 40 L 67 37" stroke="#3D2010" stroke-width="1.2"/>
  <path d="M 72 39 L 72 36" stroke="#3D2010" stroke-width="1.2"/>
  <!-- Nose -->
  <ellipse cx="60" cy="51" rx="3" ry="2.5" fill="#E8A870"/>
  <!-- Smile -->
  <path d="M 52 57 Q 60 64 68 57" stroke="#C05050" stroke-width="2" fill="#E87090"/>
  <!-- Cheeks blush -->
  <circle cx="42" cy="52" r="7" fill="#FF8080" opacity="0.3"/>
  <circle cx="78" cy="52" r="7" fill="#FF8080" opacity="0.3"/>
  <!-- Arms -->
  <path d="M 32 80 Q 10 88 8 108" stroke="#F5C89A" stroke-width="13" fill="none" stroke-linecap="round"/>
  <path d="M 88 80 Q 110 88 112 108" stroke="#F5C89A" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="8" cy="112" r="9" fill="#F5C89A"/>
  <circle cx="112" cy="112" r="9" fill="#F5C89A"/>
</svg>
