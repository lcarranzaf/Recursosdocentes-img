<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" width="480" height="110">
  <!-- Fondo -->
  <rect x="0" y="0" width="480" height="110" rx="8" fill="#f8fafc"/>

  <!-- ─── Líneas guía bloque 1 ─── -->
  <line x1="10" y1="15" x2="110" y2="15" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="10" y1="82" x2="110" y2="82" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="10" y1="48" x2="110" y2="48" stroke="#e0f2fe" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ─── Líneas guía bloque 2 ─── -->
  <line x1="130" y1="15" x2="230" y2="15" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="130" y1="82" x2="230" y2="82" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="130" y1="48" x2="230" y2="48" stroke="#e0f2fe" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ─── Líneas guía bloque 3 ─── -->
  <line x1="250" y1="15" x2="350" y2="15" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="250" y1="82" x2="350" y2="82" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="250" y1="48" x2="350" y2="48" stroke="#e0f2fe" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ─── Líneas guía bloque 4 ─── -->
  <line x1="370" y1="15" x2="470" y2="15" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="370" y1="82" x2="470" y2="82" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="370" y1="48" x2="470" y2="48" stroke="#e0f2fe" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ═══ M GUÍA AZUL (1ra — con flechas numeradas) ═══ -->
  <path d="M 20 80 L 20 20 L 57 56 L 94 20 L 94 80"
        stroke="#2563eb" stroke-width="5.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Círculos numerados de dirección -->
  <!-- 1 -->
  <circle cx="20" cy="82" r="8" fill="#2563eb"/>
  <path d="M 17 78 L 20 84 L 23 78" fill="white"/>
  <!-- 2 -->
  <circle cx="57" cy="58" r="8" fill="#2563eb"/>
  <path d="M 53 56 L 57 62 L 61 56" fill="white"/>
  <!-- 3 -->
  <circle cx="94" cy="18" r="8" fill="#2563eb"/>
  <path d="M 90 22 L 94 16 L 98 22" fill="white"/>
  <!-- 4 -->
  <circle cx="94" cy="82" r="8" fill="#2563eb"/>
  <path d="M 91 78 L 94 84 L 97 78" fill="white"/>

  <!-- ═══ M PUNTEADA (2da) ═══ -->
  <path d="M 140 80 L 140 20 L 177 56 L 214 20 L 214 80"
        stroke="#93c5fd" stroke-width="5.5" fill="none"
        stroke-dasharray="9,7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="140" cy="82" r="5" fill="#93c5fd"/>

  <!-- ═══ M PUNTEADA (3ra) ═══ -->
  <path d="M 260 80 L 260 20 L 297 56 L 334 20 L 334 80"
        stroke="#bfdbfe" stroke-width="5.5" fill="none"
        stroke-dasharray="9,7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="260" cy="82" r="5" fill="#bfdbfe"/>

  <!-- ═══ Espacio libre (4to bloque) ═══ -->
  <circle cx="380" cy="82" r="5" fill="#e0e7ff"/>

  <!-- Separadores verticales entre bloques -->
  <line x1="120" y1="10" x2="120" y2="100" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="240" y1="10" x2="240" y2="100" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="10" x2="360" y2="100" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
