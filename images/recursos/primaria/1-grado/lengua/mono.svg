<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- Body -->
  <ellipse cx="60" cy="95" rx="30" ry="36" fill="#8B5E3C"/>
  <!-- Left ear (big round) -->
  <circle cx="18" cy="45" r="16" fill="#8B5E3C"/>
  <circle cx="18" cy="45" r="9" fill="#D4956A"/>
  <!-- Right ear (big round) -->
  <circle cx="102" cy="45" r="16" fill="#8B5E3C"/>
  <circle cx="102" cy="45" r="9" fill="#D4956A"/>
  <!-- Head -->
  <circle cx="60" cy="45" r="32" fill="#8B5E3C"/>
  <!-- Face lighter area -->
  <ellipse cx="60" cy="52" rx="22" ry="18" fill="#D4956A"/>
  <!-- Eye left -->
  <circle cx="48" cy="40" r="7" fill="white"/>
  <circle cx="48" cy="40" r="4" fill="#2D1B0E"/>
  <circle cx="50" cy="38" r="1.5" fill="white"/>
  <!-- Eye right -->
  <circle cx="72" cy="40" r="7" fill="white"/>
  <circle cx="72" cy="40" r="4" fill="#2D1B0E"/>
  <circle cx="74" cy="38" r="1.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="60" cy="51" rx="5" ry="4" fill="#5C3A1E"/>
  <circle cx="58" cy="50" r="1.5" fill="#8B5E3C" opacity="0.5"/>
  <circle cx="62" cy="50" r="1.5" fill="#8B5E3C" opacity="0.5"/>
  <!-- Mouth (smile) -->
  <path d="M 50 57 Q 60 65 70 57" stroke="#5C3A1E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cheek blush left -->
  <circle cx="42" cy="54" r="7" fill="#E07878" opacity="0.35"/>
  <!-- Cheek blush right -->
  <circle cx="78" cy="54" r="7" fill="#E07878" opacity="0.35"/>
  <!-- Arms -->
  <path d="M 32 85 Q 10 78 8 100" stroke="#8B5E3C" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 88 85 Q 110 78 112 100" stroke="#8B5E3C" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="10" cy="103" r="8" fill="#8B5E3C"/>
  <circle cx="112" cy="103" r="8" fill="#8B5E3C"/>
  <!-- Belly lighter -->
  <ellipse cx="60" cy="98" rx="18" ry="22" fill="#D4956A" opacity="0.6"/>
  <!-- Tail -->
  <path d="M 88 125 Q 115 120 118 100 Q 120 85 108 82" stroke="#8B5E3C" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="40" y="124" width="16" height="14" rx="7" fill="#8B5E3C"/>
  <rect x="64" y="124" width="16" height="14" rx="7" fill="#8B5E3C"/>
  <!-- Feet -->
  <ellipse cx="48" cy="139" rx="10" ry="6" fill="#8B5E3C"/>
  <ellipse cx="72" cy="139" rx="10" ry="6" fill="#8B5E3C"/>
</svg>
